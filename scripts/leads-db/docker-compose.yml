services:
  leads-postgres:
    image: pgvector/pgvector:pg17
    container_name: leads-pgvector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: leads_admin
      POSTGRES_PASSWORD: D6HblnSek1IC51Qh5D76Kb7kdbsazdAQ
      POSTGRES_DB: leads_db
    volumes:
      - leads_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    shm_size: '4gb'
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "maintenance_work_mem=1GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_worker_processes=16"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "max_wal_size=10GB"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leads_admin -d leads_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  leads_postgres_data:
    driver: local
