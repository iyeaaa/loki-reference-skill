name: Auto-set Start Date on Status Change

on:
  # 프로젝트 상태 변경을 감지하기 위해 여러 이벤트 사용
  issues:
    types: [opened, reopened, labeled, unlabeled]
  pull_request:
    types: [opened, reopened, labeled, unlabeled]
  # 수동 실행 옵션
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to update (optional)'
        required: false
  # 15분마다 자동 실행하여 최근 변경사항 확인
  schedule:
    - cron: '*/15 * * * *'

jobs:
  set-start-date:
    runs-on: ubuntu-latest
    permissions:
      repository-projects: write
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Set Start Date when moved to In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 현재 날짜를 ISO 8601 형식으로 가져오기
            const today = new Date().toISOString().split('T')[0];

            // 처리할 이슈 번호 결정
            let issueNumbers = [];

            // workflow_dispatch로 수동 실행된 경우
            if (context.eventName === 'workflow_dispatch' && context.payload.inputs?.issue_number) {
              issueNumbers = [parseInt(context.payload.inputs.issue_number)];
            }
            // schedule로 실행된 경우 - 최근 업데이트된 이슈들 가져오기
            else if (context.eventName === 'schedule') {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc',
                per_page: 30
              });
              issueNumbers = issues.data.map(issue => issue.number);
              console.log(`Checking ${issueNumbers.length} recently updated issues`);
            }
            // 이슈 이벤트로 트리거된 경우
            else {
              const itemNumber = context.issue?.number || context.payload.pull_request?.number;
              if (itemNumber) {
                issueNumbers = [itemNumber];
              }
            }

            if (issueNumbers.length === 0) {
              console.log('No issues to process');
              return;
            }

            // 각 이슈에 대해 처리
            for (const itemNumber of issueNumbers) {
              console.log(`\n--- Processing issue #${itemNumber} ---`);

              // 프로젝트 정보 가져오기
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project {
                            id
                            title
                            field(name: "Status") {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                              }
                            }
                            fields(first: 20) {
                              nodes {
                                ... on ProjectV2Field {
                                  id
                                  name
                                }
                                ... on ProjectV2SingleSelectField {
                                  id
                                  name
                                }
                                ... on ProjectV2DateField {
                                  id
                                  name
                                }
                              }
                            }
                          }
                          fieldValueByName(name: "Status") {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                            }
                          }
                          fieldValueByName(name: "Start date") {
                            ... on ProjectV2ItemFieldDateValue {
                              date
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              try {
                const result = await github.graphql(query, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  number: itemNumber
                });

                const projectItems = result.repository.issue.projectItems.nodes;

                if (projectItems.length === 0) {
                  console.log(`Issue #${itemNumber} is not in any project`);
                  continue;
                }

                for (const item of projectItems) {
                  const status = item.fieldValueByName?.name;
                  const startDate = item.fieldValueByName?.date;
                  const projectTitle = item.project.title;

                  console.log(`  Project: ${projectTitle}`);
                  console.log(`  Status: ${status}`);
                  console.log(`  Current Start Date: ${startDate || 'not set'}`);

                  // "작업중(In progress)"로 이동했고, Start Date가 없는 경우
                  if (status === '작업중(In progress)' && !startDate) {
                    // Start Date 필드 ID 찾기
                    const startDateField = item.project.fields.nodes.find(
                      field => field.name === 'Start date'
                    );

                    if (startDateField) {
                      // Start Date 설정
                      const updateMutation = `
                        mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Date!) {
                          updateProjectV2ItemFieldValue(
                            input: {
                              projectId: $projectId
                              itemId: $itemId
                              fieldId: $fieldId
                              value: { date: $value }
                            }
                          ) {
                            projectV2Item {
                              id
                            }
                          }
                        }
                      `;

                      await github.graphql(updateMutation, {
                        projectId: item.project.id,
                        itemId: item.id,
                        fieldId: startDateField.id,
                        value: today
                      });

                      console.log(`  ✅ Set Start Date to ${today} for item #${itemNumber} in project "${projectTitle}"`);
                    } else {
                      console.log(`  ⚠️ Start date field not found in project "${projectTitle}"`);
                    }
                  } else if (status !== '작업중(In progress)') {
                    console.log(`  ⏭️  Skipping - status is not "작업중(In progress)"`);
                  } else {
                    console.log(`  ⏭️  Skipping - Start Date already set`);
                  }
                }
              } catch (error) {
                console.error(`Error processing issue #${itemNumber}:`, error);
                // 다음 이슈로 계속 진행
                continue;
              }
            }
