services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/sendgrinda.cloud-0001/fullchain.pem:/etc/nginx/ssl/certificate.pem:ro
      - /etc/letsencrypt/live/sendgrinda.cloud-0001/privkey.pem:/etc/nginx/ssl/private.key:ro
    depends_on:
      - admin
      - elysia-server
      - uptime-kuma
      - redisinsight
    networks:
      - app-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - elysia-server
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  elysia-server:
    build:
      context: ./elysia-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./elysia-server/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres # Docker 네트워크 내 호스트명으로 오버라이드
      - REDIS_HOST=redis # Docker 네트워크 내 호스트명으로 오버라이드
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 16G  # 메모리 제한 (OOM 방지)
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - app-network

  # BullMQ Test Worker - Independent Process
  bullmq-worker:
    build:
      context: ./elysia-server
      dockerfile: Dockerfile.worker
    ports:
      - "3010:3010" # Health check endpoint
    depends_on:
      - redis
      - postgres
    env_file:
      - ./elysia-server/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres # Docker 네트워크 내 호스트명으로 오버라이드
      - REDIS_HOST=redis # Docker 네트워크 내 호스트명으로 오버라이드
      - HEALTH_PORT=3010 # Health server port
      # BullMQ Worker Performance Tuning
      - BULLMQ_CONCURRENCY=20 # 동시 처리 job 개수
      - BULLMQ_RATE_LIMIT_MAX=50 # 초당 최대 처리 개수
      - BULLMQ_RATE_LIMIT_DURATION=1000 # Rate limit 기간 (ms)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3010/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G  # 2G → 4G: 배치 마이그레이션 안정성 확보
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - app-network

  postgres:
    image: postgres:17.2
    ports:
      - "5432:5432"
    env_file:
      - ./elysia-server/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      # PostgreSQL Performance Tuning
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 8MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - app-network

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    env_file:
      - ./elysia-server/.env
    command: >
      redis-server
      --appendonly yes
      --requirepass sendgrid_redis_password_2024
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --save 900 1
      --save 300 10
      --save 60 10000
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - app-network

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - app-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app-network

  # PostgreSQL Automated Backup Service
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:17
    depends_on:
      - postgres
    env_file:
      - ./elysia-server/.env
    environment:
      # Database connection
      POSTGRES_HOST: postgres
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_EXTRA_OPTS: "--format=custom --compress=6 --no-owner --no-privileges"
      # Backup schedule - 배포마다 백업되므로 자동 백업은 하루 2회로 축소
      SCHEDULE: "0 3,15 * * *" # 03:00, 15:00 (하루 2회)
      # Retention policy - 배포 백업과 별도로 관리
      BACKUP_KEEP_DAYS: 3 # 일간 백업 3일 보관
      BACKUP_KEEP_WEEKS: 4 # 주간 백업 4주 보관
      BACKUP_KEEP_MONTHS: 2 # 월간 백업 2개월 보관
      # Health check
      HEALTHCHECK_PORT: 8080
      # Webhook notification (optional - uncomment if needed)
      # WEBHOOK_URL: https://hooks.slack.com/services/xxx
    volumes:
      - postgres_backup:/backups
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "postgres", "-U", "postgres"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  postgres_backup:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  uptime_kuma_data:
    driver: local
