name: SendGrinda CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy SendGrinda to AWS EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout SendGrinda Repository
      uses: actions/checkout@v4

    - name: Configure AWS EC2 SSH Connection
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: Register EC2 Host to Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Prepare SendGrinda Environment Files
      run: |
        echo "${{ secrets.ADMIN_ENV }}" > ./admin/.env
        echo "${{ secrets.ELYSIA_SERVER_ENV }}" > ./elysia-server/.env

    - name: Deploy SendGrinda to EC2 via Rsync
      run: |
        echo "[+] Creating deployment directory on EC2"
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p ~/send-grid-test"

        echo "[+] Syncing SendGrinda files to EC2"
        rsync -avz --delete \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='dist/' \
          --exclude='.next/' \
          --exclude='.turbo/' \
          --exclude='*.log' \
          --exclude='.DS_Store' \
          ./ ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/send-grid-test/

    - name: Build and Deploy SendGrinda with Docker Compose
      run: |
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -o pipefail

          cd ~/send-grid-test

          echo "[+] Backing up current containers for rollback"
          docker compose ps -q > /tmp/previous_containers.txt

          echo "[+] Building SendGrinda Docker images"
          docker compose build --pull

          echo "[+] Deploying SendGrinda containers"
          docker compose up -d --no-build --remove-orphans

          echo "[+] Running health checks (timeout: 90s)"
          HEALTH_CHECK_TIMEOUT=90
          HEALTH_CHECK_INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $HEALTH_CHECK_TIMEOUT ]; do
            ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
            ELYSIA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")

            # Check bullmq-worker container health via Docker
            WORKER_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' send-grid-test-bullmq-worker-1 2>/dev/null || echo "unknown")
            WORKER_RUNNING=$(docker inspect --format='{{.State.Running}}' send-grid-test-bullmq-worker-1 2>/dev/null || echo "false")

            if [ "$ADMIN_STATUS" = "200" ] && [ "$ELYSIA_STATUS" = "200" ] && [ "$WORKER_RUNNING" = "true" ]; then
              # Worker health check takes time, so we also accept "starting" status initially
              if [ "$WORKER_HEALTH" = "healthy" ] || [ "$WORKER_HEALTH" = "starting" ]; then
                echo " => Health check passed: All services are healthy (Worker: $WORKER_HEALTH)"
                break
              fi
            fi

            echo " => Waiting for services (Admin: $ADMIN_STATUS, Elysia: $ELYSIA_STATUS, Worker: $WORKER_RUNNING/$WORKER_HEALTH) [$ELAPSED/$HEALTH_CHECK_TIMEOUT s]"
            sleep $HEALTH_CHECK_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_CHECK_INTERVAL))
          done

          if [ $ELAPSED -ge $HEALTH_CHECK_TIMEOUT ]; then
            echo "[!] Health check failed - Rolling back deployment"
            echo "[!] Final status - Admin: $ADMIN_STATUS, Elysia: $ELYSIA_STATUS, Worker: $WORKER_RUNNING/$WORKER_HEALTH"
            docker compose logs --tail=50 bullmq-worker
            docker compose down
            if [ -f /tmp/previous_containers.txt ]; then
              echo "[+] Restoring previous containers"
              docker compose up -d --no-build
            fi
            exit 1
          fi

          echo "[+] Cleaning up unused Docker images"
          docker image prune -f

          echo ""
          echo "[+] Reloading Nginx to update upstream IP addresses"
          docker exec send-grid-test-nginx-1 nginx -s reload
          sleep 2

          echo ""
          echo "[+] SendGrinda Container Status:"
          docker compose ps

          echo ""
          echo "[+] SendGrinda Service Logs (last 10 lines):"
          docker compose logs --tail=10
        EOF

    - name: Verify SendGrinda Deployment
      run: |
        echo "[+] Verifying SendGrinda deployment from external network (via domain)"
        sleep 5

        # Admin health check via nginx (https://app.rinda.ai/health)
        ADMIN_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.rinda.ai/health || echo "000")
        # Elysia API health check via nginx (https://app.rinda.ai/api/health)
        ELYSIA_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.rinda.ai/api/health || echo "000")

        if [ "$ADMIN_CHECK" != "200" ] || [ "$ELYSIA_CHECK" != "200" ]; then
          echo "[!] Deployment verification failed"
          echo " => Admin service (app.rinda.ai/health): $ADMIN_CHECK (expected: 200)"
          echo " => Elysia service (app.rinda.ai/api/health): $ELYSIA_CHECK (expected: 200)"
          exit 1
        fi

        echo "[+] Deployment verified successfully"
        echo " => Admin service (app.rinda.ai/health): $ADMIN_CHECK"
        echo " => Elysia service (app.rinda.ai/api/health): $ELYSIA_CHECK"
        echo ""
        echo "[+] SendGrinda is now live at https://app.rinda.ai"