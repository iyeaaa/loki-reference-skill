name: SendGrinda CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy SendGrinda to AWS EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout SendGrinda Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # Required for git diff HEAD~1 HEAD

    - name: Configure AWS EC2 SSH Connection
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: Register EC2 Host to Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Prepare SendGrinda Environment Files
      run: |
        echo "${{ secrets.ADMIN_ENV }}" > ./admin/.env
        echo "${{ secrets.ELYSIA_SERVER_ENV }}" > ./elysia-server/.env

    - name: Detect Changed Components
      id: changes
      run: |
        # Get list of changed files compared to previous commit
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
        echo "Changed files:"
        echo "$CHANGED_FILES"

        # Worker-specific files that require worker restart
        WORKER_PATTERNS=(
          "elysia-server/src/worker.ts"
          "elysia-server/src/workers/"
          "elysia-server/Dockerfile.worker"
          "elysia-server/src/lib/queue/"
          "elysia-server/src/lib/redis/"
          "elysia-server/src/lib/health.ts"
          "elysia-server/package.json"
          "elysia-server/bun.lockb"
          # Services directly imported by Worker (run: grep -rh "from.*services" src/workers/ | ... | uniq)
          "elysia-server/src/services/email.service.ts"
          "elysia-server/src/services/hunterio-domain-search.service.ts"
          "elysia-server/src/services/hunterio-email-verifier.service.ts"
          "elysia-server/src/services/job-log.service.ts"
          "elysia-server/src/services/lead-enrichment.service.ts"
          "elysia-server/src/services/lead.service.ts"
          "elysia-server/src/services/onboarding-worker.service.ts"
          "elysia-server/src/services/loops.service.ts"
          "elysia-server/src/services/sequence.service.ts"
          "elysia-server/src/services/unipile.service.ts"
          "elysia-server/src/services/workflow-email.service.ts"
          "elysia-server/src/services/workflow-execution.service.ts"
        )

        # Check if any worker-related files changed
        WORKER_CHANGED="false"
        for pattern in "${WORKER_PATTERNS[@]}"; do
          if echo "$CHANGED_FILES" | grep -q "$pattern"; then
            WORKER_CHANGED="true"
            echo "Worker file changed: $pattern"
            break
          fi
        done

        # Check if API/Admin files changed
        API_CHANGED="false"
        if echo "$CHANGED_FILES" | grep -qE "^elysia-server/"; then
          API_CHANGED="true"
        fi

        ADMIN_CHANGED="false"
        if echo "$CHANGED_FILES" | grep -qE "^admin/"; then
          ADMIN_CHANGED="true"
        fi

        echo "worker_changed=$WORKER_CHANGED" >> $GITHUB_OUTPUT
        echo "api_changed=$API_CHANGED" >> $GITHUB_OUTPUT
        echo "admin_changed=$ADMIN_CHANGED" >> $GITHUB_OUTPUT

        echo ""
        echo "[+] Change Detection Results:"
        echo "    - Worker changed: $WORKER_CHANGED"
        echo "    - API changed: $API_CHANGED"
        echo "    - Admin changed: $ADMIN_CHANGED"

    - name: Deploy SendGrinda to EC2 via Rsync
      run: |
        echo "[+] Creating deployment directory on EC2"
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p ~/send-grid-test"

        echo "[+] Syncing SendGrinda files to EC2"
        rsync -avz --delete \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='dist/' \
          --exclude='.next/' \
          --exclude='.turbo/' \
          --exclude='*.log' \
          --exclude='.DS_Store' \
          ./ ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/send-grid-test/

    - name: Pre-deployment Database Backup
      run: |
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          echo "[+] Creating pre-deployment database backup..."

          BACKUP_DIR="$HOME/backups/postgres/pre-deploy"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="${BACKUP_DIR}/postgres_pre-deploy_${TIMESTAMP}.dump"
          MAX_BACKUPS=20  # Keep only last 20 pre-deploy backups (~1GB)

          mkdir -p "${BACKUP_DIR}"

          # Check if postgres container is running
          if docker inspect send-grid-test-postgres-1 &>/dev/null; then
            # Skip if last backup was less than 30 minutes ago (avoid duplicate backups)
            LATEST=$(find "${BACKUP_DIR}" -name "*.dump" -mmin -30 2>/dev/null | head -1)
            if [ -n "${LATEST}" ]; then
              echo "[+] Recent backup exists (< 30min), skipping: $(basename ${LATEST})"
            else
              docker exec send-grid-test-postgres-1 pg_dump -U postgres -d postgres \
                --format=custom --compress=6 --no-owner --no-privileges \
                --file=/tmp/backup.dump

              docker cp send-grid-test-postgres-1:/tmp/backup.dump "${BACKUP_FILE}"
              docker exec send-grid-test-postgres-1 rm -f /tmp/backup.dump

              SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
              echo "[+] Pre-deploy backup created: ${BACKUP_FILE} (${SIZE})"
            fi

            # Keep only last N backups (count-based, not time-based)
            cd "${BACKUP_DIR}"
            ls -t *.dump 2>/dev/null | tail -n +$((MAX_BACKUPS + 1)) | xargs -r rm -f
            CURRENT_COUNT=$(ls -1 *.dump 2>/dev/null | wc -l)
            echo "[+] Pre-deploy backups: ${CURRENT_COUNT}/${MAX_BACKUPS}"
          else
            echo "[!] PostgreSQL container not running, skipping backup"
          fi
        EOF

    - name: Build and Deploy SendGrinda with Docker Compose
      env:
        WORKER_CHANGED: ${{ steps.changes.outputs.worker_changed }}
      run: |
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} bash -s -- "$WORKER_CHANGED" << 'DEPLOY_EOF'
          WORKER_CHANGED="$1"
          set -e
          set -o pipefail

          cd ~/send-grid-test

          echo "[+] Backing up current containers for rollback"
          docker compose ps -q > /tmp/previous_containers.txt

          echo ""
          echo "[+] Selective Build Strategy"
          echo "    - Worker code changed: $WORKER_CHANGED"

          if [ "$WORKER_CHANGED" = "true" ]; then
            echo ""
            echo "[+] Building ALL Docker images (worker code changed)"
            docker compose build --pull

            echo "[+] Deploying ALL containers"
            docker compose up -d --no-build --remove-orphans
          else
            echo ""
            echo "[+] Building API/Admin images only (worker unchanged)"
            docker compose build --pull elysia-server admin

            echo "[+] Deploying API/Admin containers only (preserving worker)"
            # Get current worker container ID before deployment
            WORKER_CONTAINER_ID=$(docker ps -q -f name=send-grid-test-bullmq-worker-1)

            # Only restart non-worker services
            docker compose up -d --no-build --no-deps elysia-server admin nginx

            # Verify worker is still running (not restarted)
            NEW_WORKER_CONTAINER_ID=$(docker ps -q -f name=send-grid-test-bullmq-worker-1)
            if [ "$WORKER_CONTAINER_ID" = "$NEW_WORKER_CONTAINER_ID" ]; then
              echo "[+] ✅ Worker preserved (Container ID: $WORKER_CONTAINER_ID)"
            else
              echo "[!] ⚠️ Worker was restarted (Old: $WORKER_CONTAINER_ID, New: $NEW_WORKER_CONTAINER_ID)"
            fi
          fi

          echo "[+] Running health checks (timeout: 90s)"
          HEALTH_CHECK_TIMEOUT=90
          HEALTH_CHECK_INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $HEALTH_CHECK_TIMEOUT ]; do
            ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
            ELYSIA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")

            # Check bullmq-worker container health via Docker
            WORKER_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' send-grid-test-bullmq-worker-1 2>/dev/null || echo "unknown")
            WORKER_RUNNING=$(docker inspect --format='{{.State.Running}}' send-grid-test-bullmq-worker-1 2>/dev/null || echo "false")

            if [ "$ADMIN_STATUS" = "200" ] && [ "$ELYSIA_STATUS" = "200" ] && [ "$WORKER_RUNNING" = "true" ]; then
              # Worker health check takes time, so we also accept "starting" status initially
              if [ "$WORKER_HEALTH" = "healthy" ] || [ "$WORKER_HEALTH" = "starting" ]; then
                echo " => Health check passed: All services are healthy (Worker: $WORKER_HEALTH)"
                break
              fi
            fi

            echo " => Waiting for services (Admin: $ADMIN_STATUS, Elysia: $ELYSIA_STATUS, Worker: $WORKER_RUNNING/$WORKER_HEALTH) [$ELAPSED/$HEALTH_CHECK_TIMEOUT s]"
            sleep $HEALTH_CHECK_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_CHECK_INTERVAL))
          done

          if [ $ELAPSED -ge $HEALTH_CHECK_TIMEOUT ]; then
            echo "[!] Health check failed - Rolling back deployment"
            echo "[!] Final status - Admin: $ADMIN_STATUS, Elysia: $ELYSIA_STATUS, Worker: $WORKER_RUNNING/$WORKER_HEALTH"
            docker compose logs --tail=50 bullmq-worker
            docker compose down
            if [ -f /tmp/previous_containers.txt ]; then
              echo "[+] Restoring previous containers"
              docker compose up -d --no-build
            fi
            exit 1
          fi

          echo "[+] Cleaning up unused Docker images"
          docker image prune -f

          echo ""
          echo "[+] Reloading Nginx to update upstream IP addresses"
          docker exec send-grid-test-nginx-1 nginx -s reload
          sleep 2

          echo ""
          echo "[+] SendGrinda Container Status:"
          docker compose ps

          echo ""
          echo "[+] SendGrinda Service Logs (last 10 lines):"
          docker compose logs --tail=10
        DEPLOY_EOF

    - name: Verify SendGrinda Deployment
      run: |
        echo "[+] Verifying SendGrinda deployment from external network (via domain)"
        sleep 5

        # Admin health check via nginx (https://app.rinda.ai/health)
        ADMIN_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.rinda.ai/health || echo "000")
        # Elysia API health check via nginx (https://app.rinda.ai/api/health)
        ELYSIA_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.rinda.ai/api/health || echo "000")

        if [ "$ADMIN_CHECK" != "200" ] || [ "$ELYSIA_CHECK" != "200" ]; then
          echo "[!] Deployment verification failed"
          echo " => Admin service (app.rinda.ai/health): $ADMIN_CHECK (expected: 200)"
          echo " => Elysia service (app.rinda.ai/api/health): $ELYSIA_CHECK (expected: 200)"
          exit 1
        fi

        echo "[+] Deployment verified successfully"
        echo " => Admin service (app.rinda.ai/health): $ADMIN_CHECK"
        echo " => Elysia service (app.rinda.ai/api/health): $ELYSIA_CHECK"
        echo ""
        echo "[+] SendGrinda is now live at https://app.rinda.ai"