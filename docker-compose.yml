services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/sendgrinda.cloud/fullchain.pem:/etc/nginx/ssl/certificate.pem:ro
      - /etc/letsencrypt/live/sendgrinda.cloud/privkey.pem:/etc/nginx/ssl/private.key:ro
    depends_on:
      - admin
      - elysia-server
      - uptime-kuma
      - redisinsight
    networks:
      - app-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - elysia-server
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  elysia-server:
    build:
      context: ./elysia-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
    networks:
      - app-network

  postgres:
    image: postgres:17.2
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    restart: always
    command: redis-server --appendonly yes --requirepass sendgrid_redis_password_2024
    networks:
      - app-network

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - ./volumes/redisinsight:/data
    depends_on:
      - redis
    networks:
      - app-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3002:3001"
    volumes:
      - ./volumes/uptime-kuma:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge