name: Auto-assign to Gyudong Kim

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  project_card:
    types: [created]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Assign to Gyudong Kim
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const assignee = 'classygoody';

            // 이슈인 경우
            if (context.eventName === 'issues') {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [assignee]
              });
              console.log(`Assigned issue #${context.issue.number} to ${assignee}`);
            }

            // PR인 경우
            if (context.eventName === 'pull_request') {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                assignees: [assignee]
              });
              console.log(`Assigned PR #${context.payload.pull_request.number} to ${assignee}`);
            }

            // 프로젝트 카드인 경우
            if (context.eventName === 'project_card') {
              const card = context.payload.project_card;
              if (card.content_url) {
                const urlParts = card.content_url.split('/');
                const issueNumber = parseInt(urlParts[urlParts.length - 1]);

                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  assignees: [assignee]
                });
                console.log(`Assigned project card item #${issueNumber} to ${assignee}`);
              }
            }
