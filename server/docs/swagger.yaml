basePath: /
definitions:
  dto.Post:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      imgUrl:
        type: string
      title:
        type: string
      userId:
        type: integer
    type: object
  dto.PostsBody:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.PostsData'
      message:
        type: string
    type: object
  dto.PostsData:
    properties:
      posts:
        items:
          $ref: '#/definitions/dto.Post'
        type: array
    type: object
  dto.PostsResponse:
    properties:
      body:
        $ref: '#/definitions/dto.PostsBody'
    type: object
  dto.ResponseDto:
    properties:
      body:
        properties:
          code:
            type: integer
          data: {}
          message:
            type: string
        type: object
    type: object
  dto.Todo:
    properties:
      completed:
        type: boolean
      content:
        type: string
      id:
        type: integer
      userId:
        type: integer
    type: object
  dto.TodosBody:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.TodosData'
      message:
        type: string
    type: object
  dto.TodosData:
    properties:
      todos:
        items:
          $ref: '#/definitions/dto.Todo'
        type: array
    type: object
  dto.TodosResponse:
    properties:
      body:
        $ref: '#/definitions/dto.TodosBody'
    type: object
  dto.TranslationData:
    properties:
      originalText:
        example: 안녕하세요
        type: string
      sourceLang:
        example: ko
        type: string
      targetLang:
        example: en
        type: string
      translatedText:
        example: Hello
        type: string
    type: object
  dto.TranslationRequest:
    properties:
      body:
        properties:
          targetLang:
            example: en
            type: string
          text:
            example: 안녕하세요
            type: string
        type: object
    type: object
  dto.TranslationResponse:
    properties:
      body:
        properties:
          code:
            type: integer
          data:
            $ref: '#/definitions/dto.TranslationData'
          message:
            type: string
        type: object
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: Simple translation API service with health check, posts, todos, and
    translation endpoints
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: 하나 랭커넥트 번역 API
  version: 1.0.0
paths:
  /api/health:
    get:
      consumes:
      - application/json
      description: Simple health check endpoint that returns the service status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ResponseDto'
      summary: Health check
      tags:
      - Health
  /api/posts:
    get:
      consumes:
      - application/json
      description: Fetch posts from external API and return them
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PostsResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get posts
      tags:
      - Posts
  /api/todos:
    get:
      consumes:
      - application/json
      description: Fetch todos from external API and return them
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TodosResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get todos
      tags:
      - Todos
  /api/translate:
    post:
      consumes:
      - application/json
      description: Translate text from one language to another using Google Translate
        API
      parameters:
      - description: Translation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TranslationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TranslationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Translate text
      tags:
      - Translation
schemes:
- http
- https
swagger: "2.0"
