name: Type Check & Lint

on:
  push:
    branches: [main, develop, 'refactor/**', 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # Frontend - Admin Dashboard 체크
  frontend-check:
    name: Frontend - Admin (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn Berry
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn dependencies
        uses: actions/cache@v3
        with:
          path: |
            admin/.yarn/cache
            admin/.pnp.*
          key: ${{ runner.os }}-yarn-admin-${{ hashFiles('admin/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-admin-

      - name: Install dependencies
        working-directory: ./admin
        run: yarn install --immutable

      - name: TypeScript type check
        working-directory: ./admin
        run: yarn type-check

      - name: Biome lint check
        working-directory: ./admin
        run: yarn lint:check || yarn run biome check ./src

      - name: Build test
        working-directory: ./admin
        run: yarn build

  # Backend - Elysia Server 체크
  backend-check:
    name: Backend - Elysia (Bun + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'

      - name: Cache Bun dependencies
        uses: actions/cache@v3
        with:
          path: |
            elysia-server/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-elysia-${{ hashFiles('elysia-server/package.json', 'elysia-server/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-elysia-

      - name: Install dependencies
        working-directory: ./elysia-server
        run: bun install

      - name: TypeScript type check
        working-directory: ./elysia-server
        run: bun run tsc --noEmit || (bun add -d typescript && bun run tsc --noEmit)

      - name: Biome lint check
        working-directory: ./elysia-server
        run: bun run lint:check

      - name: Build test
        working-directory: ./elysia-server
        run: bun run build

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [admin-type-check, elysia-type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Admin Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: false
          tags: send-grid-test-admin:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Elysia Server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./elysia-server
          file: ./elysia-server/Dockerfile
          push: false
          tags: send-grid-test-elysia:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [admin-type-check, elysia-type-check, docker-build-test]

    steps:
      - name: Summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.admin-type-check.result }}" == "success" ]; then
            echo "✅ Admin Dashboard: Type check and lint passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Admin Dashboard: Type check or lint failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.elysia-type-check.result }}" == "success" ]; then
            echo "✅ Elysia Server: Type check and lint passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Elysia Server: Type check or lint failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.docker-build-test.result }}" == "success" ]; then
            echo "✅ Docker: Build test passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Docker: Build test failed" >> $GITHUB_STEP_SUMMARY
          fi