name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          ~/.bun
          admin/node_modules
          elysia-server/node_modules
        key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json', '**/bun.lockb') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Install dependencies for admin
      working-directory: ./admin
      run: npm ci

    - name: Install dependencies for elysia-server
      working-directory: ./elysia-server
      run: bun install --frozen-lockfile

    - name: Lint admin
      working-directory: ./admin
      run: npm run lint || true

    - name: Lint elysia-server
      working-directory: ./elysia-server
      run: bun run lint || true

    - name: Type check admin
      working-directory: ./admin
      run: npm run type-check || npm run build

    - name: Type check elysia-server
      working-directory: ./elysia-server
      run: bun run type-check || bun run build

    - name: Run tests for admin
      working-directory: ./admin
      run: npm run test || true

    - name: Run tests for elysia-server
      working-directory: ./elysia-server
      run: bun test || true

    - name: Build admin
      working-directory: ./admin
      run: npm run build

    - name: Build elysia-server
      working-directory: ./elysia-server
      run: bun run build

    - name: Build Docker images
      run: |
        docker compose build --parallel

    - name: Docker security scan
      run: |
        # Scan for vulnerabilities in Docker images
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity HIGH,CRITICAL \
          --exit-code 0 \
          send-grid-test-admin:latest || true

        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity HIGH,CRITICAL \
          --exit-code 0 \
          send-grid-test-elysia-server:latest || true