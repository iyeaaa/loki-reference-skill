services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/sendgrinda.cloud-0001/fullchain.pem:/etc/nginx/ssl/certificate.pem:ro
      - /etc/letsencrypt/live/sendgrinda.cloud-0001/privkey.pem:/etc/nginx/ssl/private.key:ro
    depends_on:
      - admin
      - elysia-server
      - uptime-kuma
      - redisinsight
    networks:
      - app-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - elysia-server
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  elysia-server:
    build:
      context: ./elysia-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./elysia-server/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres          # Docker 네트워크 내 호스트명으로 오버라이드
      - REDIS_HOST=redis          # Docker 네트워크 내 호스트명으로 오버라이드
    networks:
      - app-network

  # BullMQ Test Worker - Independent Process
  bullmq-worker:
    build:
      context: ./elysia-server
      dockerfile: Dockerfile.worker
    depends_on:
      - redis
      - postgres
    env_file:
      - ./elysia-server/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres          # Docker 네트워크 내 호스트명으로 오버라이드
      - REDIS_HOST=redis          # Docker 네트워크 내 호스트명으로 오버라이드
    restart: always
    networks:
      - app-network

  postgres:
    image: postgres:17.2
    ports:
      - "5432:5432"
    env_file:
      - ./elysia-server/.env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    env_file:
      - ./elysia-server/.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - app-network

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - app-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  uptime_kuma_data:
    driver: local