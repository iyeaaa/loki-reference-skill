services:
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production

  postgres:
    image: postgres:17.2
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sendgrid_db
    volumes:
      - ~/data/send-grid-test/volumes/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - ~/data/send-grid-test/volumes/redis:/data
    restart: always
    command: redis-server --appendonly yes --requirepass sendgrid_redis_password_2024

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - ~/data/send-grid-test/volumes/redisinsight:/data
    depends_on:
      - redis

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3002:3001"
    volumes:
      - ~/data/send-grid-test/volumes/uptime-kuma:/app/data