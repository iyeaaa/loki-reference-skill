name: Main Branch CI/CD

on:
  push:
    branches: [main]

jobs:
  # Frontend нғҖмһ… мІҙнҒ¬
  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Yarn Berry
      run: |
        corepack enable
        corepack prepare yarn@4.10.3 --activate

    - name: Install dependencies
      working-directory: ./admin
      run: yarn install --immutable

    - name: TypeScript type check
      working-directory: ./admin
      run: yarn type-check

    - name: Biome lint check
      working-directory: ./admin
      run: yarn lint:check

  # Backend нғҖмһ… мІҙнҒ¬
  backend-check:
    name: Backend Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: 'latest'

    - name: Install dependencies
      working-directory: ./elysia-server
      run: bun install

    - name: TypeScript type check
      working-directory: ./elysia-server
      run: bun run tsc --noEmit || (bun add -d typescript && bun run tsc --noEmit)

    - name: Biome lint check
      working-directory: ./elysia-server
      run: bun run lint:check

  # нғҖмһ… мІҙнҒ¬ нҶөкіј нӣ„ л°°нҸ¬
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: Add EC2 to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Prepare environment files
      run: |
        echo "${{ secrets.ADMIN_ENV }}" > ./admin/.env
        echo "${{ secrets.ELYSIA_SERVER_ENV }}" > ./elysia-server/.env

    - name: Deploy to EC2
      run: |
        # EC2м—җ л””л үнҶ лҰ¬ мғқм„ұ
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p ~/send-grid-test"

        # rsyncлЎң нҢҢмқј м „мҶЎ (node_modules, .git л“ұ м ңмҷё)
        rsync -avz --delete \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='dist/' \
          --exclude='.next/' \
          --exclude='.turbo/' \
          --exclude='*.log' \
          --exclude='.DS_Store' \
          ./ ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/send-grid-test/

    - name: Build and deploy with Docker Compose
      run: |
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/send-grid-test

          # мқҙм „ м»Ён…Ңмқҙл„Ҳ л°ұм—… (лЎӨл°ұмҡ©)
          docker compose ps -q > /tmp/previous_containers.txt

          # мғҲ мқҙлҜём§Җ л№Ңл“ң (мәҗмӢұ нҷңмҡ©)
          docker compose build --pull

          # Blue-Green л°°нҸ¬: мғҲ м»Ён…Ңмқҙл„Ҳ мӢңмһ‘ нӣ„ мқҙм „ м»Ён…Ңмқҙл„Ҳ мў…лЈҢ
          docker compose up -d --no-build --remove-orphans

          # н—¬мҠӨмІҙнҒ¬ лҢҖкё° (мөңлҢҖ 60мҙҲ)
          echo "Waiting for services to be healthy..."
          HEALTH_CHECK_TIMEOUT=60
          HEALTH_CHECK_INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $HEALTH_CHECK_TIMEOUT ]; do
            ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
            ELYSIA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")

            if [ "$ADMIN_STATUS" = "200" ] && [ "$ELYSIA_STATUS" = "200" ]; then
              echo "вң… All services are healthy!"
              break
            fi

            echo "Waiting for services... (Admin: $ADMIN_STATUS, Elysia: $ELYSIA_STATUS)"
            sleep $HEALTH_CHECK_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_CHECK_INTERVAL))
          done

          # н—¬мҠӨмІҙнҒ¬ мӢӨнҢЁ мӢң лЎӨл°ұ
          if [ $ELAPSED -ge $HEALTH_CHECK_TIMEOUT ]; then
            echo "вқҢ Health check failed. Rolling back..."
            docker compose down
            if [ -f /tmp/previous_containers.txt ]; then
              # мқҙм „ м»Ён…Ңмқҙл„ҲлЎң лЎӨл°ұ мӢңлҸ„
              docker compose up -d --no-build
            fi
            exit 1
          fi

          # л°°нҸ¬ м„ұкіө мӢң мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ” мқҙлҜём§Җ м •лҰ¬
          docker image prune -f

          # мөңмў… м»Ён…Ңмқҙл„Ҳ мғҒнғң нҷ•мқё
          echo -e "\nрҹ“Ұ Container Status:"
          docker compose ps

          # м„ңл№„мҠӨ лЎңк·ё нҷ•мқё (мөңк·ј 10мӨ„)
          echo -e "\nрҹ“Ӣ Recent Logs:"
          docker compose logs --tail=10
        EOF

    - name: Verify deployment
      run: |
        echo "Verifying deployment from GitHub Actions..."
        sleep 5

        # мҷёл¶Җм—җм„ң м„ңл№„мҠӨ м ‘к·ј нҷ•мқё
        ADMIN_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000/health || echo "000")
        ELYSIA_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3001/health || echo "000")

        if [ "$ADMIN_CHECK" != "200" ] || [ "$ELYSIA_CHECK" != "200" ]; then
          echo "вқҢ Deployment verification failed!"
          echo "Admin service: $ADMIN_CHECK, Elysia service: $ELYSIA_CHECK"
          exit 1
        fi

        echo "вң… Deployment verified successfully!"
        echo "Admin service: $ADMIN_CHECK, Elysia service: $ELYSIA_CHECK"